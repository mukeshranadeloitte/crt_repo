name: Trigger Copado Robotic Testing Job

on:
  workflow_dispatch:
  push:
    branches:
      - main 

jobs:
  trigger-test:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger CRT Job
        run: |
          echo "Triggering Copado Robotic Testing Job..."

          curl -v "https://api.robotic.copado.com/api/v3/test-jobs/${{ secrets.CRT_TEST_JOB_ID }}/runs" \
            -H "Authorization: Bearer ${{ secrets.CRT_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d '{}'
