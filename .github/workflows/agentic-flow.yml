name: Agentic DevOps Pipeline

on:
  pull_request:
    branches: ["uat"]

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: write

jobs:
  automated-governance:
    name: Automated Hard Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Install Salesforce Scanner plugin
        run: sf plugins install @salesforce/sfdx-scanner

      - name: Salesforce Code Analyzer
        continue-on-error: true
        run: |
          sf scanner run \
            --target "./force-app" \
            --format "csv" \
            --outfile "sfdx-report.csv" \
            --severity-threshold 3

      - name: Upload scanner report
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: sfdx-report
          path: sfdx-report.csv
          if-no-files-found: warn

      - name: Fortify Security Scan
        uses: fortify/github-action@v1
        with:
          sast-scan: true

      - name: Authenticate to UAT org
        env:
          SFDX_AUTH_URL: ${{ secrets.CRT_UAT_AUTHURL }}
        run: |
          echo "$SFDX_AUTH_URL" > sfdxAuthUrl.txt
          sf org login sfdx-url --sfdx-url-file sfdxAuthUrl.txt --alias uat --set-default
          rm -f sfdxAuthUrl.txt

      - name: Run Apex tests with coverage (JSON output)
        run: |
          sf apex run test \
            --target-org uat \
            --code-coverage \
            --result-format json \
            --wait 30 > test-result.json

      - name: Enforce minimum 75% test coverage
        shell: bash
        run: |
          COVERAGE=$(jq -r '.result.summary.testRunCoverage // 0' test-result.json)
          echo "Coverage: ${COVERAGE}%"
          awk -v c="$COVERAGE" 'BEGIN { exit (c+0 < 75) ? 1 : 0 }' || {
            echo "Coverage below 75%"
            exit 1
          }

      - name: Check destructive changes presence
        id: destructive-check
        shell: bash
        run: |
          if [ -f "manifest/destructiveChanges.xml" ] || [ -f "manifest/destructveChanges.xml" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment reminder for destructive changes backup
        if: steps.destructive-check.outputs.present == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Detected destructive changes file. Please confirm data backup is completed before deployment approval."
            });

  manual-validation:
    name: Manual Agent Validation (ReleaseGate)
    needs: automated-governance
    runs-on: ubuntu-latest
    environment:
      name: ReleaseGate
      url: ${{ github.server_url }}/${{ github.repository }}/blob/main/docs/manual_runbook.md

    steps:
      - name: Log approval
        run: echo "Manual validation complete. Releasing robots."

  robotic-testing:
    name: Trigger CRT Test Job
    needs: manual-validation
    runs-on: ubuntu-latest

    steps:
      - name: Trigger CRT Test Suite Run
        env:
          CRT_PAT:        ${{ secrets.CRT_PAT }}
          CRT_PROJECT_ID: ${{ vars.CRT_PROJECT_ID }}
          CRT_JOB_ID:     ${{ vars.CRT_JOB_ID }}
          CRT_ORG_ID:     ${{ vars.CRT_ORG_ID }}
        run: |
          set -euo pipefail
          if [ -z "${CRT_PAT}" ] || [ -z "${CRT_PROJECT_ID}" ] || [ -z "${CRT_JOB_ID}" ]; then
            echo "Missing required values — set these repository variables:"
            echo "  CRT_PROJECT_ID (e.g. 73283)  CRT_JOB_ID (e.g. 115686)"
            echo "And this secret: CRT_PAT"
            exit 1
          fi

          # Build JSON body — include orgId only when CRT_ORG_ID is set.
          if [ -n "${CRT_ORG_ID}" ]; then
            PAYLOAD=$(jq -cn --arg oid "${CRT_ORG_ID}" '{"orgId":$oid}')
          else
            PAYLOAD='{}'
          fi

          # External PAT uses Bearer auth.
          # To generate: eu-robotic.copado.com → Profile → External Personal Access Tokens
          #              → New Token → copy and store as secret CRT_PAT.
          echo "CRT_PAT length: ${#CRT_PAT} chars"
          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            -X POST "https://api.eu-robotic.copado.com/pace/v4/projects/${CRT_PROJECT_ID}/jobs/${CRT_JOB_ID}/builds" \
            -H "Authorization: Bearer ${CRT_PAT}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}")

          HTTP_CODE=$(echo "${RESPONSE}" | tail -1)
          BODY=$(echo "${RESPONSE}" | head -n -1)
          echo "HTTP ${HTTP_CODE}: ${BODY}"

          if [[ "${HTTP_CODE}" -lt 200 || "${HTTP_CODE}" -ge 300 ]]; then
            echo "::error::CRT API call failed with HTTP ${HTTP_CODE}"
            exit 1
          fi

          BUILD_ID=$(echo "${BODY}" | jq -r '.id // .buildId // empty')
          [ -n "${BUILD_ID}" ] && echo "CRT build started — Build ID: ${BUILD_ID}" || true

      - name: Mark story deployed
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Deployed: CRT robotic tests have been triggered via Qentinel Pace."
            });
