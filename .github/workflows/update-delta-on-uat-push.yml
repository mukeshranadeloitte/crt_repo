name: Update Delta Baseline on UAT Push

# ─────────────────────────────────────────────────────────────────────────────
# Fires on every push to `uat` — direct commits AND PR merge commits.
# Updates the DELTA_FROM_COMMIT repository variable to github.sha so the
# next PR's delta is always calculated from the exact UAT branch tip,
# regardless of how the commit landed (PR merge or direct push).
#
# Required secret:
#   GH_PAT — Personal Access Token with `repo` scope (to write repo variables)
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - uat
    paths:
      - force-app/**
      - .github/workflows/e2e-uat-pipeline.yml
      - .github/sf-scanner-waivers.csv

permissions: {}

jobs:
  update-delta-baseline:
    name: Update DELTA_FROM_COMMIT to UAT tip
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Update DELTA_FROM_COMMIT variable
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          PUSHED_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          PUSHER: ${{ github.actor }}
          REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          echo "Push to '${REF}' by '${PUSHER}'"
          echo "New UAT tip SHA: ${PUSHED_SHA}"

          if [[ -z "${GH_PAT:-}" ]]; then
            echo "::warning::Secret GH_PAT not set — cannot auto-update DELTA_FROM_COMMIT."
            echo "::warning::Manually update DELTA_FROM_COMMIT to: ${PUSHED_SHA}"
            exit 0
          fi

          # Try PATCH first (update existing variable)
          HTTP=$(curl -sS -o /tmp/var_response.json -w "%{http_code}" \
            -L -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_PAT}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/actions/variables/DELTA_FROM_COMMIT" \
            -d "{\"name\":\"DELTA_FROM_COMMIT\",\"value\":\"${PUSHED_SHA}\"}")

          if [[ "${HTTP}" == "204" ]]; then
            echo "✅ DELTA_FROM_COMMIT updated to ${PUSHED_SHA}"

          elif [[ "${HTTP}" == "404" ]]; then
            echo "Variable not found — creating it..."
            HTTP2=$(curl -sS -o /tmp/var_create.json -w "%{http_code}" \
              -L -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_PAT}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/actions/variables" \
              -d "{\"name\":\"DELTA_FROM_COMMIT\",\"value\":\"${PUSHED_SHA}\"}")
            if [[ "${HTTP2}" == "201" ]]; then
              echo "✅ DELTA_FROM_COMMIT created with value ${PUSHED_SHA}"
            else
              echo "::warning::Could not create DELTA_FROM_COMMIT (HTTP ${HTTP2}). Update manually."
              cat /tmp/var_create.json || true
            fi

          else
            echo "::warning::Unexpected HTTP ${HTTP} — update DELTA_FROM_COMMIT manually to: ${PUSHED_SHA}"
            cat /tmp/var_response.json || true
          fi

          echo "Next PR delta will be calculated from: ${PUSHED_SHA}"
