name: PR -> UAT Org validation + code analysis

on:
  pull_request:
    branches:
      - uat
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review

jobs:
  sfdx-validation:
    name: Deploy check + static analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm deps
        run: |
          if [ -f package-lock.json ]; then
            echo "package-lock.json found; running npm ci"
            npm ci
          else
            echo "package-lock.json not found; running npm install"
            npm install
          fi

      - name: Install Salesforce CLI
        # Use the maintained setup action and fallback to npm install for resilience
        uses: sfdx-actions/setup-sfdx@v1

      - name: Verify Salesforce CLI installed
        run: |
          if ! command -v sfdx >/dev/null; then
            echo "sfdx not found, installing via npm"
            npm install -g sfdx-cli
          fi
          sfdx --version

      - name: Authenticate to UAT org
        env:
          SFDX_AUTH_URL: ${{ secrets.CRT_UAT_AUTHURL }}
        run: |
          echo "$SFDX_AUTH_URL" > sfdxAuthUrl.txt
          sfdx auth:sfdxurl:store -f sfdxAuthUrl.txt -a uat
          sfdx force:org:display -u uat

      - name: Determine target test classes from PR description
        id: set-test-classes
        run: |
          body="${{ github.event.pull_request.body }}"
          echo "PR body: $body"

          # Also check PR comments for test classes
          comments=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" | jq -r '.[].body // empty' 2>/dev/null || echo "")
          echo "PR comments: $comments"

          # Combine body and comments
          full_text="$body $comments"
          echo "Full combined text: $full_text"

          # Extract test classes: find line with "test" + ":" and extract after colon
          line=$(echo "$full_text" | grep -i "test" | grep ":" | head -1)
          echo "Matched line: $line"

          # Remove everything before and including the colon
          RAW_CLASSES=$(echo "$line" | sed 's/^[^:]*:[[:space:]]*//')
          echo "Raw extracted: '$RAW_CLASSES'"

          # Clean up: replace commas with spaces, trim spaces
          extracted=$(echo "$RAW_CLASSES" | tr ',' ' ' | xargs)
          echo "Cleaned test classes: '$extracted'"

          if [ -z "$extracted" ]; then
            echo "No test classes specified in PR body or comments."
            echo "test_level=none" >> $GITHUB_OUTPUT
          else
            echo "Detected test classes: $extracted"
            echo "test_level=RunSpecifiedTests" >> $GITHUB_OUTPUT
            echo "test_classes=$extracted" >> $GITHUB_OUTPUT
          fi

      - name: Install SGD plugin
        run: |
          # Use npm install as fallback for the sf plugin install failure
          echo "Trying sf plugin install on sfdx-git-delta..."
          if ! (echo y | sf plugins install sfdx-git-delta); then
            echo "sf plugin install failed, trying npm global install"
            npm install -g sfdx-git-delta@latest
          fi
          git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Building Package SGD
        run: |
          sf sgd:source:delta --to "HEAD" --from "${{ vars.CRT_UAT_COMMIT_ID }}" --output-dir "." --source-dir force-app/

      - name: Package
        run: |
          echo " ------ Package ------"
          if [ -f package/package.xml ]; then
            cat package/package.xml
          else
            echo "No package/package.xml generated"
          fi
          echo " ---------------------"
          echo "                       "
          echo " ------ Destructive Package------"
          if [ -f destructiveChanges/destructiveChanges.xml ]; then
            cat destructiveChanges/destructiveChanges.xml
          else
            echo "No destructiveChanges/destructiveChanges.xml generated"
          fi
          echo "---------------------------------"

      - name: Compute delta and decide test behavior
        id: delta-tests
        run: |
          changed_files=$(find force-app -type f | sed 's|^||' | sort | uniq)
          echo "Changed files from sgd:source:delta:\n$changed_files"
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          echo "Base SHA: $base_sha"; echo "Head SHA: $head_sha"

          changed_status=$(git diff --name-status $base_sha $head_sha || true)
          echo "Changed status lines:\n$changed_status"

          changed_status=$(git diff --name-status $base_sha $head_sha || true)
          echo "Changed status lines:\n$changed_status"

          package_changed=$(echo "$changed_files" | grep -E '^manifest/package.xml$' || true)

          has_apex_in_package="false"
          if [ -f manifest/package.xml ] && grep -q '<name>ApexClass</name>' manifest/package.xml; then
            has_apex_in_package="true"
          fi

          # Setup structures
          temp_manifest="./.github/temp/package.xml"
          temp_destructive="./.github/temp/destructiveChangesPre.xml"
          temp_input="./.github/temp/changed_metadata.txt"
          mkdir -p ./.github/temp
          rm -f "$temp_manifest" "$temp_destructive" "$temp_input"

          declare -A typeMembers

          add_member() {
            type="$1"; member="$2"
            if [ -z "${typeMembers[$type]}" ]; then
              typeMembers[$type]="$member"
            else
              existing="${typeMembers[$type]}"
              if ! echo "$existing" | grep -qx "$member"; then
                typeMembers[$type]="$existing\n$member"
              fi
            fi
          }

          get_api_name() {
            file_path="$1"
            rel="$2"

            # Skip metadata files - only process the actual file
            if [[ "$rel" == *-meta.xml ]]; then
              return
            fi

            # If the file contains <fullName>, prefer that as API name
            if [ -f "$file_path" ] && grep -q '<fullName>' "$file_path" 2>/dev/null; then
              fullName=$(grep -oPm1 '(?<=<fullName>)[^<]+' "$file_path" 2>/dev/null || true)
              [ -n "$fullName" ] && echo "$fullName" && return
            fi

            case "$rel" in
              classes/*.cls)
                echo "$(basename "$rel" .cls)" ;;
              triggers/*.trigger)
                echo "$(basename "$rel" .trigger)" ;;
              pages/*.page)
                echo "$(basename "$rel" .page)" ;;
              components/*.component)
                echo "$(basename "$rel" .component)" ;;
              aura/*/*)
                echo "$(echo "$rel" | cut -d'/' -f2)" ;;
              lwc/*/*)
                echo "$(echo "$rel" | cut -d'/' -f2)" ;;
              objects/*.object)
                echo "$(basename "$rel" .object)" ;;
              objects/*/object/*)
                echo "$(echo "$rel" | cut -d'/' -f2)" ;;
              permissionsets/*.permissionset)
                echo "$(basename "$rel" .permissionset)" ;;
              profiles/*.profile)
                echo "$(basename "$rel" .profile)" ;;
              staticresources/*.resource)
                echo "$(basename "$rel" .resource)" ;;
              labels/*.labels)
                echo "CustomLabels" ;;
              flows/*.flow)
                echo "$(basename "$rel" .flow)" ;;
              datacategorygroups/*.datacategorygroup)
                echo "$(basename "$rel" .datacategorygroup)" ;;
              * )
                echo "$(basename "${rel%.*}")" ;;
            esac
          }

          normalized=
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            # Skip metadata files - we only need the actual source file
            if [[ "$file" == *-meta.xml ]]; then
              continue
            fi
            if [[ ! "$file" =~ ^force-app/main/default/ ]]; then
              continue
            fi
            rel=${file#force-app/main/default/}
            meta=""
            fullname=""
            case "$rel" in
              classes/*)
                meta="ApexClass" ;;
              triggers/*)
                meta="ApexTrigger" ;;
              pages/*)
                meta="ApexPage" ;;
              components/*)
                meta="ApexComponent" ;;
              aura/*/*)
                meta="AuraDefinitionBundle" ;;
              lwc/*/*)
                meta="LightningComponentBundle" ;;
              objects/*.object|objects/*/object/*)
                meta="CustomObject" ;;
              permissionsets/*)
                meta="PermissionSet" ;;
              profiles/*)
                meta="Profile" ;;
              staticresources/*)
                meta="StaticResource" ;;
              labels/*)
                meta="CustomLabels" ;;
              flows/*)
                meta="Flow" ;;
              datacategorygroups/*)
                meta="DataCategoryGroup" ;;
              * )
                folder=$(echo "$rel" | cut -d'/' -f1)
                meta=${folder^}
                ;;
            esac

            # Get API name for this source file
            file_path="./$file"
            fullname=$(get_api_name "$file_path" "$rel")

            if [ -n "$meta" ] && [ -n "$fullname" ]; then
              add_member "$meta" "$fullname"
            fi
          done <<< "$changed_files"

          # deleted apex etc for destructive package
          apex_deleted_files=$(echo "$changed_status" | awk '/^D[[:space:]]+force-app\/main\/default\/.*\.(cls|cls-meta.xml)$/ {print $2}' || true)

          apex_changed_classes=""
          while IFS= read -r file; do
            if [[ "$file" =~ ^force-app/main/default/classes/.*\.cls$ ]]; then
              className=$(basename "$file" .cls)
              if [ -z "$apex_changed_classes" ]; then
                apex_changed_classes="$className"
              else
                case ",${apex_changed_classes}," in
                  *,${className},*) ;;
                  *) apex_changed_classes+=",$className" ;;
                esac
              fi
            fi
          done <<< "$changed_files"

          if [ -n "$apex_deleted_files" ]; then
            for f in $apex_deleted_files; do
              deleted_rel=${f#force-app/main/default/}
              if [[ "$deleted_rel" =~ ^classes/ ]]; then
                dname=$(basename "$deleted_rel" .cls)
                add_member "ApexClass" "$dname"
                if [ -z "$apex_changed_classes" ]; then
                  apex_changed_classes="$dname"
                else
                  case ",${apex_changed_classes}," in
                    *,${dname},*) ;;
                    *) apex_changed_classes+=",$dname" ;;
                  esac
                fi
              fi
            done
          fi

          # Collect changed test classes from delta
          changed_test_classes=$(echo "$changed_files" | grep -E '^force-app/main/default/classes/.*(Test|Tests)\.cls$' | sed -E 's|^force-app/main/default/classes/(.*)\.cls$|\1|' | sort -u | paste -sd "," -)

          # Infer test classes from changed Apex classes (auto-detect by naming conventions)
          inferred_test_classes=""
          if [ -n "$apex_changed_classes" ]; then
            for className in $(echo "$apex_changed_classes" | tr ',' ' '); do
              for suffix in "Test" "Tests" "TestClass"; do
                candidate="${className}${suffix}"
                # ensure candidate exists in repository or changed test list
                if [ -f "force-app/main/default/classes/${candidate}.cls" ] || echo ",${changed_test_classes}," | grep -q ",${candidate},"; then
                  if [ -z "$inferred_test_classes" ]; then
                    inferred_test_classes="$candidate"
                  else
                    case ",${inferred_test_classes}," in
                      *,${candidate},*) ;;
                      *) inferred_test_classes+=",$candidate" ;;
                    esac
                  fi
                fi
              done
            done
          fi

          # Combine explicit changed tests and inferred tests
          if [ -n "$changed_test_classes" ]; then
            for candidate in $(echo "$changed_test_classes" | tr ',' ' '); do
              if [ -z "$inferred_test_classes" ]; then
                inferred_test_classes="$candidate"
              else
                case ",${inferred_test_classes}," in
                  *,${candidate},*) ;;
                  *) inferred_test_classes+=",$candidate" ;;
                esac
              fi
            done
          fi

          echo "apex_changed_classes=$apex_changed_classes" >> $GITHUB_OUTPUT
          echo "inferred_test_classes=$inferred_test_classes" >> $GITHUB_OUTPUT

          # write package manifest for all collected metadata types
          if [ ${#typeMembers[@]} -gt 0 ]; then
            echo "<?xml version=\"1.0\" encoding=\"UTF-8\"?>" > "$temp_manifest"
            echo "<Package xmlns=\"http://soap.sforce.com/2006/04/metadata\">" >> "$temp_manifest"
            for key in "${!typeMembers[@]}"; do
              printf "  <types>\n" >> "$temp_manifest"
              echo -e "${typeMembers[$key]}" | sort -u | while IFS= read -r member; do
                [ -z "$member" ] && continue
                echo "    <members>$member</members>" >> "$temp_manifest"
              done
              echo "    <name>$key</name>" >> "$temp_manifest"
              echo "  </types>" >> "$temp_manifest"
            done
            echo "  <version>66.0</version>" >> "$temp_manifest"
            echo "</Package>" >> "$temp_manifest"
            echo "deploy_manifest=$temp_manifest" >> $GITHUB_OUTPUT
            echo "Delta package.xml contents:"; cat "$temp_manifest"
          fi

          # destructive package for deleted metadata
          if [ -n "$apex_deleted_files" ]; then
            # we only built ApexClass deletes above; in future can add other types
            echo "<?xml version=\"1.0\" encoding=\"UTF-8\"?>" > "$temp_destructive"
            echo "<Package xmlns=\"http://soap.sforce.com/2006/04/metadata\">" >> "$temp_destructive"
            echo "  <types>" >> "$temp_destructive"
            echo "    <name>ApexClass</name>" >> "$temp_destructive"
            echo "  </types>" >> "$temp_destructive"
            echo "  <version>66.0</version>" >> "$temp_destructive"
            echo "</Package>" >> "$temp_destructive"
            echo "destructive_manifest=$temp_destructive" >> $GITHUB_OUTPUT
            echo "Destructive package.xml content:"; cat "$temp_destructive"
          fi

          if [ ${#typeMembers[@]} -gt 0 ] || [ "$has_apex_in_package" = "true" ]; then
            echo "apex_required=true" >> $GITHUB_OUTPUT
          else
            echo "apex_required=false" >> $GITHUB_OUTPUT
          fi

          if [ "${{ steps.set-test-classes.outputs.test_level }}" = "RunSpecifiedTests" ]; then
            echo "tests_required=true" >> $GITHUB_OUTPUT
          else
            echo "tests_required=false" >> $GITHUB_OUTPUT
          fi

      - name: Validate test requirements
        run: |
          apex_required="${{ steps.delta-tests.outputs.apex_required }}"
          tests_required="${{ steps.delta-tests.outputs.tests_required }}"
          test_level="${{ steps.set-test-classes.outputs.test_level }}"
          apex_changed_classes="${{ steps.delta-tests.outputs.apex_changed_classes }}"

          if [ "$apex_required" = "true" ] && [ "$test_level" != "RunSpecifiedTests" ]; then
            echo "ERROR: Apex classes changed but no test classes were specified in PR comments."
            echo "Changed Apex classes in this PR: $apex_changed_classes"
            echo "To fix: edit the PR description and add a line like:"
            echo "  tests: MyFirstTestClass, MySecondTestClass"
            echo "If you already have test classes names, just comma-separated list them there."
            echo "Next steps:"
            echo "1) Update PR description as above."
            echo "2) Push an updated commit or reopen the PR."
            echo "3) Wait for the workflow to rerun and confirm coverage >= 85%."
            echo "4) If coverage is still below threshold, add or extend test methods for the changed Apex classes."
            exit 1
          fi

      - name: Run check-only deploy to UAT org (print errors)
        shell: bash
        run: |

          set -euo pipefail

          apex_required="${{ steps.delta-tests.outputs.apex_required }}"
          pr_test_classes="${{ steps.set-test-classes.outputs.test_classes }}"
          inferred_test_classes="${{ steps.delta-tests.outputs.inferred_test_classes }}"
          manifest_path="${{ steps.delta-tests.outputs.deploy_manifest }}"
          destructive_path="${{ steps.delta-tests.outputs.destructive_manifest }}"

          deploy_cmd=(sfdx force:source:deploy -u uat --checkonly --verbose --json)

          if [ -n "${manifest_path:-}" ]; then
            echo "Using generated manifest: $manifest_path"
            cat "$manifest_path"
            deploy_cmd+=(--manifest "$manifest_path")
          else
            echo "No delta manifest; deploying full source"
            deploy_cmd+=(-p force-app/main/default)
          fi

          if [ -n "${destructive_path:-}" ]; then
            echo "Including destructive manifest: $destructive_path"
            deploy_cmd+=(-x "$destructive_path")
          fi

          all_test_classes=""
          if [ -n "${pr_test_classes:-}" ]; then all_test_classes="$pr_test_classes"; fi
          if [ -n "${inferred_test_classes:-}" ]; then
            if [ -z "$all_test_classes" ]; then all_test_classes="$inferred_test_classes"
            else all_test_classes="$all_test_classes,$inferred_test_classes"
            fi
          fi

          tests_deduped="$(echo "$all_test_classes" | tr ',' '\n' | sed '/^[[:space:]]*$/d' | awk '!seen[$0]++')"

          if [ -n "${tests_deduped:-}" ]; then
            echo "Running tests:"
            echo "$tests_deduped"
            deploy_cmd+=(--testlevel RunSpecifiedTests)
            while IFS= read -r t; do
              [ -z "$t" ] && continue
              deploy_cmd+=(--runtests "$t")
            done <<< "$tests_deduped"
          elif [ "$apex_required" = "true" ]; then
            echo "ERROR: Apex changed but no tests specified/found."
            exit 1
          else
            echo "No Apex changes; using NoTestRun"
            deploy_cmd+=(--testlevel NoTestRun)
          fi

          echo "Final deploy command:"
          printf ' %q' "${deploy_cmd[@]}"; echo

          # Run deploy: keep stdout JSON clean; capture stderr separately
          set +e
          "${deploy_cmd[@]}" > deploy-output.json 2> deploy-stderr.log
          rc=$?
          set -e

          if [ $rc -ne 0 ]; then
            echo "Deploy failed (exit code $rc). Showing errors..."

            echo "---- sfdx stderr ----"
            cat deploy-stderr.log || true

            echo "---- top-level message/status ----"
            jq -r '{status: .status, message: .message} | @json' deploy-output.json 2>/dev/null || cat deploy-output.json

            echo "---- componentFailures ----"
            jq -r '.result.details.componentFailures // empty' deploy-output.json 2>/dev/null || true

            echo "---- test failures ----"
            jq -r '.result.details.runTestResult.failures // empty' deploy-output.json 2>/dev/null || true

            echo "---- coverage warnings ----"
            jq -r '.result.details.runTestResult.codeCoverageWarnings // empty' deploy-output.json 2>/dev/null || true

            exit 1
          fi

      - name: Check coverage from deploy results
        run: |
          apex_required="${{ steps.delta-tests.outputs.apex_required }}"

          if [ "$apex_required" != "true" ]; then
            echo "No Apex tests run; coverage check skipped."
            exit 0
          fi

          coverage=$(jq -r '.result.details.runTestResult.codeCoverage | if type=="object" then .coveragePercent // .overallCoverage else empty end' deploy-output.json 2>/dev/null || true)

          if [ -z "$coverage" ] || [ "$coverage" = "null" ]; then
            echo "Could not determine coverage from deploy output; failing for safety."
            exit 1
          fi

          echo "Test coverage: $coverage%"
          required=85
          exceed=$(echo "$coverage >= $required" | bc -l)
          if [ "$exceed" -ne 1 ]; then
            echo "Test coverage $coverage% is below required $required%";
            exit 1
          fi

      - name: Install Salesforce Scanner CLI
        run: npm install -g @salesforce/sfdx-scanner

      - name: Run Salesforce code analyzer (PMD)
        run: |
          sfdx scanner:run --target force-app/main/default --engine pmd --format json --out scanner-report.json
          cat scanner-report.json

      - name: Upload scanner report artifact
        uses: actions/upload-artifact@v4
        with:
          name: scanner-report
          path: scanner-report.json
