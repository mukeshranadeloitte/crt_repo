name: PR -> UAT Org validation + code analysis

on:
  pull_request:
    branches:
      - uat
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review

# Cancel any in-progress run for the same PR when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  COVERAGE_THRESHOLD: 85

jobs:
  sfdx-validation:
    name: Deploy check + static analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm deps
        run: |
          if [ -f package-lock.json ]; then
            echo "package-lock.json found; running npm ci"
            npm ci
          else
            echo "package-lock.json not found; running npm install"
            npm install
          fi

      # Use the same install approach as deployment.yml for consistency
      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Authenticate to UAT org
        env:
          SFDX_AUTH_URL: ${{ secrets.CRT_UAT_AUTHURL }}
        run: |
          echo "$SFDX_AUTH_URL" > sfdxAuthUrl.txt
          sf org login sfdx-url --sfdx-url-file sfdxAuthUrl.txt --alias uat
          rm -f sfdxAuthUrl.txt
          sf org display --target-org uat

      - name: Extract test classes from PR description and comments
        id: set-test-classes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          echo "PR body: $PR_BODY"

          # gh CLI is pre-installed on ubuntu-latest runners
          comments=$(gh api \
            "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[].body' 2>/dev/null || echo "")
          echo "PR comments: $comments"

          full_text="$PR_BODY
          $comments"

          # Match lines starting with "tests:" or "test classes:" (case-insensitive)
          line=$(echo "$full_text" | grep -iE '^\s*(tests?(\s+classes?)?)\s*:' | head -1)
          echo "Matched line: $line"

          RAW_CLASSES=$(echo "$line" | sed 's/^[^:]*:[[:space:]]*//')
          extracted=$(echo "$RAW_CLASSES" | tr ',' ' ' | xargs)
          echo "Cleaned test classes: '$extracted'"

          if [ -z "$extracted" ]; then
            echo "No test classes specified in PR body or comments."
            echo "test_level=none" >> "$GITHUB_OUTPUT"
          else
            echo "Detected test classes: $extracted"
            echo "test_level=RunSpecifiedTests" >> "$GITHUB_OUTPUT"
            echo "test_classes=$extracted" >> "$GITHUB_OUTPUT"
          fi

      - name: Install SGD plugin
        run: |
          echo y | sf plugins install sfdx-git-delta || npm install -g sfdx-git-delta@latest
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build delta package with SGD
        run: |
          sf sgd:source:delta \
            --to "HEAD" \
            --from "${{ vars.CRT_UAT_COMMIT_ID }}" \
            --output-dir "." \
            --source-dir force-app/

      - name: Display generated packages
        run: |
          echo "===== package/package.xml ====="
          cat package/package.xml 2>/dev/null || echo "(not generated)"
          echo ""
          echo "===== destructiveChanges/destructiveChanges.xml ====="
          cat destructiveChanges/destructiveChanges.xml 2>/dev/null || echo "(not generated)"

      - name: Compute Apex changes and infer test classes
        id: delta-tests
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "Base SHA: $BASE_SHA  Head SHA: $HEAD_SHA"

          # Use git diff for the actual changed files in this PR (not find, which returns all files)
          changed_files=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" 2>/dev/null \
            || git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$changed_files"

          # Check if SGD package includes Apex types
          has_apex="false"
          if [ -f package/package.xml ] && grep -qE '<name>ApexClass|ApexTrigger</name>' package/package.xml; then
            has_apex="true"
          fi

          # Collect changed non-test Apex class names
          apex_changed_classes=""
          while IFS= read -r file; do
            [[ "$file" =~ ^force-app/main/default/classes/.*\.cls$ ]] || continue
            [[ "$file" =~ (Test|Tests)\.cls$ ]] && continue
            className=$(basename "$file" .cls)
            case ",${apex_changed_classes}," in
              *,"$className",*) ;;
              *) apex_changed_classes="${apex_changed_classes:+${apex_changed_classes},}$className" ;;
            esac
          done <<< "$changed_files"

          # Collect changed test classes from git diff
          changed_test_classes=""
          while IFS= read -r file; do
            [[ "$file" =~ ^force-app/main/default/classes/.*(Test|Tests)\.cls$ ]] || continue
            className=$(basename "$file" .cls)
            case ",${changed_test_classes}," in
              *,"$className",*) ;;
              *) changed_test_classes="${changed_test_classes:+${changed_test_classes},}$className" ;;
            esac
          done <<< "$changed_files"

          # Infer test classes by naming convention (ClassName + Test / Tests / TestClass)
          inferred_test_classes="$changed_test_classes"
          if [ -n "$apex_changed_classes" ]; then
            for className in $(echo "$apex_changed_classes" | tr ',' ' '); do
              for suffix in Test Tests TestClass; do
                candidate="${className}${suffix}"
                if [ -f "force-app/main/default/classes/${candidate}.cls" ] || \
                   echo ",${changed_test_classes}," | grep -q ",${candidate},"; then
                  case ",${inferred_test_classes}," in
                    *,"$candidate",*) ;;
                    *) inferred_test_classes="${inferred_test_classes:+${inferred_test_classes},}$candidate" ;;
                  esac
                fi
              done
            done
          fi

          echo "apex_changed_classes=$apex_changed_classes"    >> "$GITHUB_OUTPUT"
          echo "inferred_test_classes=$inferred_test_classes"  >> "$GITHUB_OUTPUT"

          # Use SGD-generated packages directly if they have content
          deploy_manifest=""
          if [ -f package/package.xml ] && grep -q '<members>' package/package.xml; then
            deploy_manifest="package/package.xml"
          fi

          destructive_manifest=""
          if [ -f destructiveChanges/destructiveChanges.xml ] && \
             grep -q '<members>' destructiveChanges/destructiveChanges.xml; then
            destructive_manifest="destructiveChanges/destructiveChanges.xml"
          fi

          echo "deploy_manifest=$deploy_manifest"           >> "$GITHUB_OUTPUT"
          echo "destructive_manifest=$destructive_manifest" >> "$GITHUB_OUTPUT"

          if [ "$has_apex" = "true" ] || [ -n "$apex_changed_classes" ]; then
            echo "apex_required=true"  >> "$GITHUB_OUTPUT"
          else
            echo "apex_required=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate test requirements
        env:
          APEX_REQUIRED:    ${{ steps.delta-tests.outputs.apex_required }}
          TEST_LEVEL:       ${{ steps.set-test-classes.outputs.test_level }}
          APEX_CHANGED:     ${{ steps.delta-tests.outputs.apex_changed_classes }}
          INFERRED_TESTS:   ${{ steps.delta-tests.outputs.inferred_test_classes }}
        run: |
          # Fail only when Apex changed AND no tests were specified AND none could be inferred
          if [ "$APEX_REQUIRED" = "true" ] && \
             [ "$TEST_LEVEL" != "RunSpecifiedTests" ] && \
             [ -z "$INFERRED_TESTS" ]; then
            echo "::error::Apex classes changed but no test classes were specified or inferred."
            echo "Changed Apex classes: $APEX_CHANGED"
            echo ""
            echo "To fix, add a line to the PR description:"
            echo "  tests: MyClassTest, AnotherClassTest"
            exit 1
          fi

      - name: Validate deploy to UAT org (check-only)
        shell: bash
        run: |
          set -euo pipefail

          apex_required="${{ steps.delta-tests.outputs.apex_required }}"
          pr_test_classes="${{ steps.set-test-classes.outputs.test_classes }}"
          inferred_test_classes="${{ steps.delta-tests.outputs.inferred_test_classes }}"
          manifest_path="${{ steps.delta-tests.outputs.deploy_manifest }}"
          destructive_path="${{ steps.delta-tests.outputs.destructive_manifest }}"

          deploy_cmd=(sf project deploy validate --target-org uat --json)

          if [ -n "${manifest_path:-}" ]; then
            echo "Using delta manifest: $manifest_path"
            deploy_cmd+=(--manifest "$manifest_path")
          else
            echo "No delta manifest; validating full source"
            deploy_cmd+=(--source-dir force-app/main/default)
          fi

          if [ -n "${destructive_path:-}" ]; then
            echo "Including post-destructive manifest: $destructive_path"
            deploy_cmd+=(--post-destructive-changes "$destructive_path")
          fi

          # Merge and deduplicate PR-specified and inferred test classes
          all_test_classes=$(
            printf '%s\n%s\n' \
              "$(echo "${pr_test_classes:-}"        | tr ',' '\n')" \
              "$(echo "${inferred_test_classes:-}"  | tr ',' '\n')" \
            | sed '/^[[:space:]]*$/d' | awk '!seen[$0]++' | paste -sd ',' -
          )

          if [ -n "${all_test_classes:-}" ]; then
            echo "Running tests: $all_test_classes"
            deploy_cmd+=(--test-level RunSpecifiedTests)
            while IFS= read -r t; do
              [ -z "$t" ] && continue
              deploy_cmd+=(--tests "$(echo "$t" | xargs)")
            done <<< "$(echo "$all_test_classes" | tr ',' '\n')"
          elif [ "$apex_required" = "true" ]; then
            echo "::error::Apex changed but no tests specified or inferred."
            exit 1
          else
            echo "No Apex changes; skipping tests."
            deploy_cmd+=(--test-level NoTestRun)
          fi

          echo "Deploy command: ${deploy_cmd[*]}"

          set +e
          "${deploy_cmd[@]}" > deploy-output.json 2>deploy-stderr.log
          rc=$?
          set -e

          if [ $rc -ne 0 ]; then
            echo "::error::Deploy validation failed (exit $rc)"
            echo "--- stderr ---"
            cat deploy-stderr.log || true
            echo "--- status / message ---"
            jq -r '"Status: \(.status // "n/a")  Message: \(.message // "n/a")"' \
              deploy-output.json 2>/dev/null || cat deploy-output.json
            echo "--- component failures ---"
            jq -r '.result.details.componentFailures[]? |
              "[\(.componentType)] \(.fileName): \(.problem)"' \
              deploy-output.json 2>/dev/null || true
            echo "--- test failures ---"
            jq -r '.result.details.runTestResult.failures[]? |
              "\(.name).\(.methodName): \(.message)"' \
              deploy-output.json 2>/dev/null || true
            echo "--- coverage warnings ---"
            jq -r '.result.details.runTestResult.codeCoverageWarnings[]? | .message' \
              deploy-output.json 2>/dev/null || true
            exit 1
          fi

      - name: Check Apex test coverage
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ steps.delta-tests.outputs.apex_required }}" != "true" ]; then
            echo "No Apex changes; coverage check skipped."
            exit 0
          fi

          [ -f deploy-output.json ] || { echo "::error::deploy-output.json not found."; exit 1; }

          total=$(jq \
            '[.result.details.runTestResult.codeCoverage[]?.numLocations // 0] | add // 0' \
            deploy-output.json 2>/dev/null || echo 0)
          uncovered=$(jq \
            '[.result.details.runTestResult.codeCoverage[]?.numLocationsNotCovered // 0] | add // 0' \
            deploy-output.json 2>/dev/null || echo 0)

          # Treat null/empty as 0
          total=${total:-0};     total=${total//null/0}
          uncovered=${uncovered:-0}; uncovered=${uncovered//null/0}

          if [ "$total" -le 0 ]; then
            echo "::error::Cannot determine coverage from deploy output."
            jq '.result.details.runTestResult | keys' deploy-output.json 2>/dev/null || true
            exit 1
          fi

          covered=$(( total - uncovered ))
          coverage=$(awk -v c="$covered" -v t="$total" 'BEGIN { printf "%.2f", (c/t)*100 }')
          echo "Coverage: $covered / $total lines = $coverage%"

          threshold="${COVERAGE_THRESHOLD:-85}"
          below=$(awk -v cov="$coverage" -v req="$threshold" \
            'BEGIN { print (cov+0 < req+0) ? 1 : 0 }')
          if [ "$below" -eq 1 ]; then
            echo "::error::Coverage $coverage% is below required ${threshold}%."
            exit 1
          fi
          echo "Coverage check passed ($coverage% >= ${threshold}%)."

      - name: Install Salesforce Code Analyzer
        run: echo y | sf plugins install @salesforce/sfdx-scanner || npm install -g @salesforce/sfdx-scanner

      - name: Run Salesforce Code Analyzer
        shell: bash
        run: |
          set -euo pipefail

          sf scanner run \
            --target "force-app/main/default" \
            --format csv \
            --outfile scanner-report.csv || true

          echo "===== Scanner Report (first 100 lines) ====="
          head -100 scanner-report.csv 2>/dev/null || echo "(no findings)"

      - name: Upload scanner report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scanner-report
          path: scanner-report.csv
          if-no-files-found: warn
          retention-days: 7
