# Description: PR-triggered deployment pipeline for UAT branch
# Deploys delta changes on PR open/update, then triggers CRT smoke tests
name: PR_UAT_Deployment_And_SmokeTest

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - uat
    paths:
      - "force-app/**"

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Deploy delta changes to the UAT org
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy Delta to UAT Org
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required for delta calculation

      - name: Git Log
        run: git log --oneline -20

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"

      - name: Install Salesforce CLI
        run: npm install @salesforce/cli --global

      - name: Install sfdx-git-delta plugin
        run: |
          echo y | sf plugins install sfdx-git-delta
          git config --global --add safe.directory /home/runner/work/crt_repo/crt_repo

      - name: Build delta package (PR head vs UAT base)
        # Computes the diff between the PR head commit and the target UAT branch tip
        run: |
          sf sgd:source:delta \
            --to   "HEAD" \
            --from "${{ github.event.pull_request.base.sha }}" \
            --output-dir "." \
            --source-dir force-app/

      - name: Display generated packages
        run: |
          echo "====== package/package.xml ======"
          cat package/package.xml || echo "(empty / not generated)"
          echo ""
          echo "====== destructiveChanges/destructiveChanges.xml ======"
          cat destructiveChanges/destructiveChanges.xml || echo "(empty / not generated)"

      - name: Authenticate to UAT org
        run: |
          echo "${{ secrets.CRT_UAT_AUTHURL }}" > SF_envnameLogin_URL.txt
          sf org login sfdx-url --sfdx-url-file SF_envnameLogin_URL.txt

      - name: Deploy with destructive changes
        # Runs when destructive changes are present (members exist in the XML)
        run: |
          if [ -f destructiveChanges/destructiveChanges.xml ] && \
             { grep -q '<types>' destructiveChanges/destructiveChanges.xml || \
               grep -q '<members>' destructiveChanges/destructiveChanges.xml; }; then
            sf project deploy start \
              -x package/package.xml \
              --post-destructive-changes destructiveChanges/destructiveChanges.xml \
              -o "${{ secrets.CRT_UAT_USERNAME }}" \
              --verbose
          else
            echo "No destructive changes detected — skipping destructive deploy step."
          fi

      - name: Deploy (no destructive changes)
        # Runs when there are no destructive changes
        run: |
          if ! { [ -f destructiveChanges/destructiveChanges.xml ] && \
                 { grep -q '<types>' destructiveChanges/destructiveChanges.xml || \
                   grep -q '<members>' destructiveChanges/destructiveChanges.xml; }; }; then
            sf project deploy start \
              -x package/package.xml \
              -o "${{ secrets.CRT_UAT_USERNAME }}"
          else
            echo "Destructive deploy was handled in the previous step — skipping plain deploy."
          fi

  # ──────────────────────────────────────────────
  # JOB 2: Run CRT smoke tests against UAT org
  # ──────────────────────────────────────────────
  trigger-crt-tests:
    name: Trigger CRT Test Job (EU Robotic)
    runs-on: ubuntu-latest
    needs: deploy
    if: success()

    steps:
      - name: Trigger CRT Test Execution
        env:
          CRT_PAT:        ${{ secrets.CRT_PAT }}
          CRT_JOB_ID:     ${{ vars.CRT_JOB_ID     || '115686' }}
          CRT_PROJECT_ID: ${{ vars.CRT_PROJECT_ID  || '73283'  }}
          CRT_ORG_ID:     ${{ vars.CRT_ORG_ID      || '43532'  }}
        run: |
          set -euo pipefail
          if [ -z "${CRT_PAT}" ]; then
            echo "Missing required secret: CRT_PAT"
            exit 1
          fi

          # Build payload with printf — avoids jq $var parse errors
          PAYLOAD=$(printf '{"orgId":"%s","projectId":"%s"}' "${CRT_ORG_ID}" "${CRT_PROJECT_ID}")

          echo "Triggering CRT job ${CRT_JOB_ID} (project ${CRT_PROJECT_ID}, org ${CRT_ORG_ID})"

          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            -X POST "https://eu-robotic.copado.com/api/v3/jobs/${CRT_JOB_ID}/runs" \
            -H "Authorization: apiKey ${CRT_PAT}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}")

          HTTP_CODE=$(echo "${RESPONSE}" | tail -1)
          BODY=$(echo "${RESPONSE}" | head -n -1)
          echo "HTTP ${HTTP_CODE}: ${BODY}"

          if [[ "${HTTP_CODE}" -lt 200 || "${HTTP_CODE}" -ge 300 ]]; then
            echo "::error::CRT API call failed with HTTP ${HTTP_CODE}"
            exit 1
          fi

          echo "✅ CRT job triggered successfully (HTTP ${HTTP_CODE})"

          # Response may be JSON, plain text, or empty — all are fine after a 2xx.
          RUN_ID=$(echo "${BODY}" | jq -r '.id // .runId // .executionId // empty' 2>/dev/null || true)
          if [ -n "${RUN_ID}" ]; then
            echo "CRT Run ID: ${RUN_ID}"
          else
            echo "Run started. Response: ${BODY:-<empty>}"
          fi

      - name: CRT Test Execution Summary
        if: always()
        env:
          CRT_JOB_ID:     ${{ vars.CRT_JOB_ID     || '115686' }}
          CRT_PROJECT_ID: ${{ vars.CRT_PROJECT_ID  || '73283'  }}
          CRT_ORG_ID:     ${{ vars.CRT_ORG_ID      || '43532'  }}
        run: |
          {
            echo "## 🧪 CRT Test Execution Summary"
            echo ""
            echo "| Detail | Value |"
            echo "|--------|-------|"
            echo "| **Instance** | https://eu-robotic.copado.com |"
            echo "| **Org ID** | ${CRT_ORG_ID} |"
            echo "| **Project ID** | ${CRT_PROJECT_ID} |"
            echo "| **Job ID** | ${CRT_JOB_ID} |"
            echo ""
            echo "### 🔗 View Results"
            echo "[Open CRT Dashboard](https://eu-robotic.copado.com/jobs/${CRT_JOB_ID}?projectId=${CRT_PROJECT_ID}&orgId=${CRT_ORG_ID})"
          } >> "$GITHUB_STEP_SUMMARY"
