# Description: PR-triggered deployment pipeline for UAT branch
# Deploys delta changes on PR open/update, then triggers CRT smoke tests
name: PR_UAT_Deployment_And_SmokeTest

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - uat
    paths:
      - "force-app/**"

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Deploy delta changes to the UAT org
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy Delta to UAT Org
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required for delta calculation

      - name: Git Log
        run: git log --oneline -20

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"

      - name: Install Salesforce CLI
        run: npm install @salesforce/cli --global

      - name: Install sfdx-git-delta plugin
        run: |
          echo y | sf plugins install sfdx-git-delta
          git config --global --add safe.directory /home/runner/work/crt_repo/crt_repo

      - name: Build delta package (PR head vs UAT base)
        # Computes the diff between the PR head commit and the target UAT branch tip
        run: |
          sf sgd:source:delta \
            --to   "HEAD" \
            --from "${{ github.event.pull_request.base.sha }}" \
            --output-dir "." \
            --source-dir force-app/

      - name: Display generated packages
        run: |
          echo "====== package/package.xml ======"
          cat package/package.xml || echo "(empty / not generated)"
          echo ""
          echo "====== destructiveChanges/destructiveChanges.xml ======"
          cat destructiveChanges/destructiveChanges.xml || echo "(empty / not generated)"

      - name: Authenticate to UAT org
        run: |
          echo "${{ secrets.CRT_UAT_AUTHURL }}" > SF_envnameLogin_URL.txt
          sf org login sfdx-url --sfdx-url-file SF_envnameLogin_URL.txt

      - name: Deploy with destructive changes
        # Runs when destructive changes are present (members exist in the XML)
        run: |
          if [ -f destructiveChanges/destructiveChanges.xml ] && \
             { grep -q '<types>' destructiveChanges/destructiveChanges.xml || \
               grep -q '<members>' destructiveChanges/destructiveChanges.xml; }; then
            sf project deploy start \
              -x package/package.xml \
              --post-destructive-changes destructiveChanges/destructiveChanges.xml \
              -o "${{ secrets.CRT_UAT_USERNAME }}" \
              --verbose
          else
            echo "No destructive changes detected — skipping destructive deploy step."
          fi

      - name: Deploy (no destructive changes)
        # Runs when there are no destructive changes
        run: |
          if ! { [ -f destructiveChanges/destructiveChanges.xml ] && \
                 { grep -q '<types>' destructiveChanges/destructiveChanges.xml || \
                   grep -q '<members>' destructiveChanges/destructiveChanges.xml; }; }; then
            sf project deploy start \
              -x package/package.xml \
              -o "${{ secrets.CRT_UAT_USERNAME }}"
          else
            echo "Destructive deploy was handled in the previous step — skipping plain deploy."
          fi

  # ──────────────────────────────────────────────
  # JOB 2: Run CRT smoke tests against UAT org
  # ──────────────────────────────────────────────
  smoke-test:
    name: Run CRT Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger CRT Smoke Test
        env:
          CRT_API_TOKEN: ${{ secrets.CRT_API_TOKEN }}
          CRT_SERVER_URL: ${{ secrets.CRT_SERVER_URL }}
          CRT_TEST_JOB_ID: ${{ secrets.CRT_TEST_JOB_ID }}
        run: |
          curl -X POST "${CRT_SERVER_URL}/api/v1/test/execute" \
            -H "Authorization: Bearer ${CRT_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"jobId\": \"${CRT_TEST_JOB_ID}\",
              \"parameters\": {
                \"environment\": \"staging\",
                \"browser\": \"chrome\"
              }
            }"

      - name: Wait for Test Completion (optional)
        run: |
          # Poll for test results
          # Implementation depends on CRT API response structure