# Description: PR-triggered deployment pipeline for UAT branch
# Deploys delta changes on PR open/update, then triggers CRT test job after successful deploy
name: PR_UAT_Deployment_And_CRT_TestJob

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [uat]
    paths:
      - "force-app/**"

jobs:
  deploy:
    name: Deploy Delta to UAT Org
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Git Log
        run: git log --oneline -20

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"

      - name: Install Salesforce CLI
        run: npm install @salesforce/cli --global

      - name: Install sfdx-git-delta plugin
        run: |
          echo y | sf plugins install sfdx-git-delta
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build delta package (PR head vs UAT base)
        run: |
          sf sgd:source:delta \
            --to "HEAD" \
            --from "${{ github.event.pull_request.base.sha }}" \
            --output-dir "." \
            --source-dir force-app/

      - name: Display generated packages
        run: |
          echo "====== package/package.xml ======"
          cat package/package.xml || echo "(empty / not generated)"
          echo ""
          echo "====== destructiveChanges/destructiveChanges.xml ======"
          cat destructiveChanges/destructiveChanges.xml || echo "(empty / not generated)"

      - name: Authenticate to UAT org
        run: |
          echo "${{ secrets.CRT_UAT_AUTHURL }}" > SF_envnameLogin_URL.txt
          sf org login sfdx-url --sfdx-url-file SF_envnameLogin_URL.txt

      - name: Deploy with destructive changes
        run: |
          if [ -f destructiveChanges/destructiveChanges.xml ] && \
             { grep -q '<types>' destructiveChanges/destructiveChanges.xml || \
               grep -q '<members>' destructiveChanges/destructiveChanges.xml; }; then
            sf project deploy start \
              -x package/package.xml \
              --post-destructive-changes destructiveChanges/destructiveChanges.xml \
              -o "${{ secrets.CRT_UAT_USERNAME }}" \
              --verbose
          else
            echo "No destructive changes detected — skipping destructive deploy step."
          fi

      - name: Deploy (no destructive changes)
        run: |
          if ! { [ -f destructiveChanges/destructiveChanges.xml ] && \
                 { grep -q '<types>' destructiveChanges/destructiveChanges.xml || \
                   grep -q '<members>' destructiveChanges/destructiveChanges.xml; }; }; then
            sf project deploy start \
              -x package/package.xml \
              -o "${{ secrets.CRT_UAT_USERNAME }}"
          else
            echo "Destructive deploy was handled in the previous step — skipping plain deploy."
          fi

  crt-testjob:
    name: Trigger CRT Test Job (post-deploy)
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ needs.deploy.result == 'success' }}
    timeout-minutes: 30

    steps:
      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Trigger CRT Test Job run
        env:
          CRT_API_BASE: ${{ vars.CRT_API_BASE }}          # e.g., EU CRT API base (per your tenant)
          CRT_API_TOKEN: ${{ secrets.CRT_API_TOKEN }}     # CRT API token / personal access key
          CRT_TEST_JOB_ID: ${{ secrets.CRT_TEST_JOB_ID }} # CRT Test Job ID
        run: |
          RESPONSE=$(curl --silent --show-error --fail \
            --request POST \
            --url "${CRT_API_BASE}/robotic-testing/v1/test-jobs/${CRT_TEST_JOB_ID}/runs" \
            --header "Authorization: Bearer ${CRT_API_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "{
              \"environment\": \"UAT\",
              \"branch\": \"${{ github.head_ref }}\",
              \"pr_number\": \"${{ github.event.pull_request.number }}\"
            }")

          echo "CRT API response: ${RESPONSE}"
          RUN_ID=$(echo "${RESPONSE}" | jq -r '.id // empty')

          if [ -z "${RUN_ID}" ] || [ "${RUN_ID}" = "null" ]; then
            echo "Could not parse run id from CRT response."
            exit 1
          fi

          echo "CRT_RUN_ID=${RUN_ID}" >> "${GITHUB_ENV}"

      - name: Poll CRT run status
        env:
          CRT_API_BASE: ${{ vars.CRT_API_BASE }}
          CRT_API_TOKEN: ${{ secrets.CRT_API_TOKEN }}
        run: |
          MAX_ATTEMPTS=50
          SLEEP_SECONDS=30
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Polling attempt $ATTEMPT / $MAX_ATTEMPTS ..."

            STATUS_RESPONSE=$(curl --silent --show-error --fail \
              --request GET \
              --url "${CRT_API_BASE}/robotic-testing/v1/runs/${CRT_RUN_ID}" \
              --header "Authorization: Bearer ${CRT_API_TOKEN}" \
              --header "Content-Type: application/json")

            echo "Status response: ${STATUS_RESPONSE}"
            RUN_STATUS=$(echo "${STATUS_RESPONSE}" | jq -r '.status // empty')
            echo "Current status: ${RUN_STATUS}"

            case "${RUN_STATUS}" in
              PASSED)
                echo "CRT tests PASSED."
                exit 0
                ;;
              FAILED|ERROR|CANCELLED)
                echo "CRT tests ended with status: ${RUN_STATUS}"
                exit 1
                ;;
              *)
                echo "Run still in progress (status: ${RUN_STATUS}). Waiting ${SLEEP_SECONDS}s ..."
                sleep $SLEEP_SECONDS
                ;;
            esac
          done

          echo "Timed out waiting for CRT tests."
          exit 1